name: DarkgreenOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm gcc-multilib grub-pc-bin xorriso python3 python3-pip
          pip install pyserial
      - name: Build ISO
        run: make iso verify-mb2
      - name: Kernel size gate
        run: |
          size=$(stat -c%s build/darkgreenos.kernel)
          echo "kernel bytes: $size"
          test "$size" -lt 90000
      - name: QEMU serial regress
        run: python3 scripts/qemu_rmgr_regress.py
      - name: DGFS cross-boot patch test
        run: python3 scripts/patch_dgfs_profile.py --thr 7 && python3 -c "import struct; print('patch ok')"
